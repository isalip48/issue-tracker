services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: issue-tracker-server
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT:     5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/api/health"]
      interval: 30s
      timeout:  10s
      retries:  3
