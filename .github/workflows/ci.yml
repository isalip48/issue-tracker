name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server — Type Check + Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  client:
    name: Client — Type Check + Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Create env file
        run: echo "VITE_API_URL=http://localhost:5000/api" > .env

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  docker:
    name: Docker — Build Check
    runs-on: ubuntu-latest
    needs: [server, client]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build server image
        run: docker build -t issue-tracker-server ./server

      - name: Build client image
        run: docker build --build-arg VITE_API_URL=http://localhost:5000/api -f client/Dockerfile -t issue-tracker-client .
